<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>WANDERKIND</title>
<style>
  html, body { margin: 0; height: 100%; background: #1C1510; }
  #stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(120% 90% at 50% 12%, #3A2A1E 0%, #211810 55%, #15100B 100%);
    overflow: hidden;
  }
  #stage::before {
    content: ""; position: absolute; inset: 0; pointer-events: none; opacity: 0.5;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='2'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/></svg>");
  }
  .caption {
    position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%);
    font-family: "Courier New", monospace; font-size: 10px; letter-spacing: 0.24em;
    text-transform: uppercase; color: rgba(236,224,201,0.32); z-index: 2; white-space: nowrap;
  }
  #root { position: relative; z-index: 1; }
</style>
</head>
<body>
<div id="stage">
  <div id="root"></div>
</div>
<div class="caption">Wanderkind · Walk forever free · interactive prototype</div>

<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#ECE0C9"/>
    <g fill="none" stroke="#B4543A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <path d="M38 72 V42 a12 12 0 0 1 24 0 V72"/>
      <circle cx="55" cy="58" r="1.8" fill="#B4543A" stroke="none"/>
    </g>
    <circle cx="50" cy="50" r="34" fill="none" stroke="#2A2018" stroke-width="1.4" opacity="0.5"/>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
/* ===== frames/ios-frame.jsx ===== */

/* BEGIN USAGE */
// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports (to window): IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard
//
// Usage — wrap your screen content in <IOSDevice> to get the bezel, status bar
// and home indicator (props: title, dark, keyboard):
//
//   <IOSDevice title="Settings">
//     ...your screen content...
//   </IOSDevice>
//   <IOSDevice dark title="Search" keyboard>…</IOSDevice>
/* END USAGE */

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame
// ─────────────────────────────────────────────────────────────
function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      {/* status bar (absolute) */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      {/* home indicator — always on top */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  // special-key icons
  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      {/* liquid glass bg — same recipe as nav pills */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />

      {/* autocorrect bar */}
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',
            }}>{w}</div>
          </React.Fragment>
        ))}
      </div>

      {/* key layout */}
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>

      {/* bottom spacer (emoji+mic area, icons omitted) */}
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

Object.assign(window, {
  IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard,
});

</script>
<script type="text/babel">
/* ===== src/tokens.jsx ===== */
// tokens.jsx — WANDERKIND design system
// Palette: parchment / walnut ink / terracotta / rare gold
// Type: Helvetica Neue (voice) + Courier New (ledger / coordinates / stamps)

const WK = {
  // paper
  paper0: '#F6EFE0',   // lightest highlight
  paper:  '#ECE0C9',   // base parchment
  paper2: '#E4D5BA',   // deeper paper / cards on paper
  paper3: '#D9C6A4',   // edges / pressed
  // ink
  ink:    '#2A2018',   // near-black walnut, primary text
  ink70:  'rgba(42,32,24,0.70)',
  ink55:  'rgba(42,32,24,0.55)',
  ink40:  'rgba(42,32,24,0.40)',
  ink14:  'rgba(42,32,24,0.14)',
  ink08:  'rgba(42,32,24,0.08)',
  brown:  '#6F5840',   // mid brown
  brownL: '#8A6E50',
  // accents
  terra:  '#B4543A',   // terracotta — the living accent
  terraD: '#8F3E2A',   // pressed terracotta
  terraL: '#C9694B',
  gold:   '#B0853A',   // rare — verification / arrival / sacred
  goldD:  '#8C6A2C',
  // utility
  good:   '#5E7350',   // moss
};

const WK_FONT_SANS = '"Helvetica Neue", Helvetica, Arial, sans-serif';
const WK_FONT_MONO = '"Courier New", Courier, monospace';

function injectWKStyles() {
  if (document.getElementById('wk-global')) return;
  const css = `
  :root{ --paper:${WK.paper}; --ink:${WK.ink}; --terra:${WK.terra}; --gold:${WK.gold}; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ margin:0; }
  .wk{ font-family:${WK_FONT_SANS}; color:${WK.ink}; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
  .wk-mono{ font-family:${WK_FONT_MONO}; }
  .wk-eyebrow{ font-family:${WK_FONT_MONO}; font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:${WK.terra}; }
  .wk-meta{ font-family:${WK_FONT_MONO}; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:${WK.ink55}; }
  .wk-display{ font-weight:700; letter-spacing:-0.02em; line-height:0.94; }
  .wk-h1{ font-weight:700; letter-spacing:-0.015em; line-height:1.0; }
  .wk-serif-none{}
  .wk-scroll{ overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  .wk-scroll::-webkit-scrollbar{ display:none; }
  .wk-fade-up{ animation:wkFadeUp .6s cubic-bezier(.2,.7,.2,1) both; }
  @keyframes wkFadeUp{ from{ opacity:0; transform:translateY(14px);} to{ opacity:1; transform:none;} }
  .wk-fade-in{ animation:wkFadeIn .5s ease both; }
  @keyframes wkFadeIn{ from{opacity:0} to{opacity:1} }
  @keyframes wkStamp{ 0%{opacity:0; transform:scale(2.6) rotate(var(--rot,-8deg));} 55%{opacity:1;} 70%{transform:scale(.94) rotate(var(--rot,-8deg));} 100%{opacity:1; transform:scale(1) rotate(var(--rot,-8deg));} }
  .wk-pressable{ transition:transform .12s ease, opacity .12s ease; cursor:pointer; }
  .wk-pressable:active{ transform:scale(.97); opacity:.9; }
  .wk-link{ color:${WK.terra}; text-decoration:none; }
  @keyframes wkPulse{ 0%,100%{ transform:scale(1); opacity:.5 } 50%{ transform:scale(1.18); opacity:.15 } }
  @keyframes wkSweep{ 0%{ transform:translateY(-100%);} 100%{ transform:translateY(100%);} }
  @keyframes wkDash{ to{ stroke-dashoffset:0; } }
  `;
  const s = document.createElement('style');
  s.id = 'wk-global';
  s.textContent = css;
  document.head.appendChild(s);
}

// ── Paper texture overlay (fibrous grain + soft vignette) ───────────────
function WKPaper({ tone = 'paper', vignette = true, children, style = {} }) {
  const bg = WK[tone] || tone;
  return (
    <div style={{ position: 'relative', background: bg, ...style }}>
      <div style={{
        position: 'absolute', inset: 0, pointerEvents: 'none', zIndex: 0,
        backgroundImage:
          "url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.045'/></svg>\")",

}

// ── Rubber-stamp / wax-seal motif ───────────────────────────────────────
// kind: 'peak' | 'church' | 'festival' | 'door' | 'sea' | 'star' | 'bridge'
function WKStamp({ kind = 'peak', label = '', sub = '', ink = WK.terra, size = 92, rot = -7, animate = false, faded = false }) {
  const id = React.useMemo(() => 'st' + Math.random().toString(36).slice(2, 7), []);
  const glyphs = {
    peak:     <path d="M14 64 L34 30 L44 44 L54 24 L78 64 Z" fill="none" stroke={ink} strokeWidth="3" strokeLinejoin="round"/>,
    church:   <g fill="none" stroke={ink} strokeWidth="3"><path d="M46 16 V28 M40 22 H52"/><path d="M30 62 V40 L46 28 L62 40 V62"/><rect x="42" y="48" width="8" height="14"/></g>,
    festival: <g fill="none" stroke={ink} strokeWidth="3"><path d="M46 20 V62"/><path d="M46 22 L70 30 L46 40 Z" fill={ink} opacity=".85"/></g>,
    door:     <g fill="none" stroke={ink} strokeWidth="3"><path d="M30 64 V26 a16 16 0 0 1 32 0 V64"/><circle cx="55" cy="46" r="2.4" fill={ink}/></g>,
    sea:      <g fill="none" stroke={ink} strokeWidth="3" strokeLinecap="round"><path d="M20 40 q8 -8 16 0 t16 0 t16 0"/><path d="M20 52 q8 -8 16 0 t16 0 t16 0"/></g>,
    star:     <path d="M46 22 l6 16 17 1 -13 11 5 17 -15 -10 -15 10 5 -17 -13 -11 17 -1 z" fill="none" stroke={ink} strokeWidth="2.6" strokeLinejoin="round"/>,
    bridge:   <g fill="none" stroke={ink} strokeWidth="3"><path d="M16 44 q30 -22 60 0"/><path d="M16 44 V60 M76 44 V60 M31 50 V60 M46 53 V60 M61 50 V60"/></g>,
  };
  const r = size / 2;
  return (
    <div style={{
      width: size, height: size, position: 'relative', flexShrink: 0,
      opacity: faded ? 0.34 : 1,
      ['--rot']: rot + 'deg',
      transform: `rotate(${rot}deg)`,
      animation: animate ? 'wkStamp .7s cubic-bezier(.2,.8,.2,1.1) both' : 'none',
      filter: 'saturate(1.05)',
    }}>
      <svg width={size} height={size} viewBox="0 0 92 92" style={{ display: 'block' }}>
        <defs>
          <path id={id} d="M46,46 m-33,0 a33,33 0 1,1 66,0 a33,33 0 1,1 -66,0" />
        </defs>
        <circle cx="46" cy="46" r="40" fill="none" stroke={ink} strokeWidth="2.2" opacity="0.9"/>
        <circle cx="46" cy="46" r="35.5" fill="none" stroke={ink} strokeWidth="1" opacity="0.6"/>
        {glyphs[kind]}
        <text fontFamily={WK_FONT_MONO} fontSize="7.2" letterSpacing="2.1" fill={ink} opacity="0.92">
          <textPath href={`#${id}`} startOffset="0%">{label.toUpperCase()}</textPath>
        </text>
        {sub && <text x="46" y="78" textAnchor="middle" fontFamily={WK_FONT_MONO} fontSize="6.4" letterSpacing="1.4" fill={ink} opacity="0.8">{sub.toUpperCase()}</text>}
      </svg>
      {/* ink mottling */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: '50%', pointerEvents: 'none', mixBlendMode: 'screen',
        backgroundImage: "url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='92' height='92'><filter id='m'><feTurbulence type='fractalNoise' baseFrequency='0.4' numOctaves='2'/></filter><circle cx='46' cy='46' r='42' filter='url(%23m)' opacity='0.5'/></svg>\")",
      }} />
    </div>
  );
}

// ── Image placeholder (striped, with mono caption) ──────────────────────
function WKImg({ label = 'image', tone = WK.paper3, ink = WK.brown, style = {}, children, rounded = 0 }) {
  return (
    <div style={{
      position: 'relative', overflow: 'hidden', background: tone,
      borderRadius: rounded, ...style,
    }}>
      <div style={{
        position: 'absolute', inset: 0,
        backgroundImage: `repeating-linear-gradient(135deg, ${WK.ink08} 0 1px, transparent 1px 9px)`,
      }} />
      <div style={{ position: 'absolute', inset: 0, border: `1px solid ${WK.ink14}`, borderRadius: rounded }} />
      {!children && <div style={{
        position: 'absolute', left: '50%', top: '50%', transform: 'translate(-50%,-50%)',
        fontFamily: WK_FONT_MONO, fontSize: 10, letterSpacing: '0.16em', textTransform: 'uppercase',
        color: ink, opacity: 0.6, whiteSpace: 'nowrap', textAlign: 'center',
      }}>↳ {label}</div>}
      {children}
    </div>
  );
}

// ── Buttons ─────────────────────────────────────────────────────────────
function WKButton({ children, variant = 'solid', onClick, full = false, style = {}, icon = null, small = false }) {
  const base = {
    fontFamily: WK_FONT_SANS, fontWeight: 600, fontSize: small ? 13 : 15,
    letterSpacing: '0.01em', border: 'none', cursor: 'pointer',
    padding: small ? '10px 16px' : '15px 22px', borderRadius: 999,
    display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 9,
    width: full ? '100%' : 'auto', transition: 'transform .12s ease, background .2s ease, box-shadow .2s',
  };
  const variants = {
    solid:   { background: WK.ink, color: WK.paper0 },
    terra:   { background: WK.terra, color: '#FBF3E4', boxShadow: '0 8px 22px -10px rgba(143,62,42,0.7)' },
    gold:    { background: WK.gold, color: '#FBF3E4', boxShadow: '0 8px 22px -10px rgba(140,106,44,0.7)' },
    outline: { background: 'transparent', color: WK.ink, boxShadow: `inset 0 0 0 1.5px ${WK.ink}` },
    ghost:   { background: WK.ink08, color: WK.ink },
  };
  return (
    <button className="wk-pressable" style={{ ...base, ...variants[variant], ...style }} onClick={onClick}>
      {icon}{children}
    </button>
  );
}

// ── Small bits ──────────────────────────────────────────────────────────
function WKEyebrow({ children, style = {} }) {
  return <div className="wk-eyebrow" style={style}>{children}</div>;
}
function WKDivider({ label, style = {} }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 12, ...style }}>

      <div style={{ flex: 1, height: 1, background: WK.ink14 }} />
    </div>
  );
}
// dotted ledger rule
function WKRule({ style = {} }) {
  return <div style={{ height: 1, backgroundImage: `repeating-linear-gradient(90deg, ${WK.ink40} 0 4px, transparent 4px 9px)`, opacity: 0.5, ...style }} />;
}

Object.assign(window, {
  WK, WK_FONT_SANS, WK_FONT_MONO, injectWKStyles,
  WKPaper, WKStamp, WKImg, WKButton, WKEyebrow, WKDivider, WKRule,
});

// ── Cartographic map (stylized, terracotta routes + pins) ───────────────
function WKMap({ hosts, onPin, selected, style = {} }) {
  // pin positions on the 360x520 canvas
  const pins = [
    { id: 'per',    x: 196, y: 150 },
    { id: 'mateo',  x: 120, y: 300 },

        {Array.from({ length: 10 }).map((_, i) => (
          <line key={'v' + i} x1={i * 40} y1="0" x2={i * 40} y2="520" stroke={WK.ink} strokeWidth="0.5" opacity="0.07" />

        {/* coastline strokes */}
        <path d="M-20 120 q80 -40 150 10 t180 -20" fill="none" stroke={WK.brown} strokeWidth="1.1" opacity="0.3" />
        {/* dashed routes from "here" to each pin */}
        {pins.map(pn => (
          <path key={'r' + pn.id} d={`M${here.x} ${here.y} Q ${(here.x + pn.x) / 2 + 24} ${(here.y + pn.y) / 2 - 30} ${pn.x} ${pn.y}`}
            fill="none" stroke={WK.terra} strokeWidth="1.4" strokeDasharray="2 6" strokeLinecap="round" opacity={selected === pn.id ? 0.9 : 0.4} />
        ))}
        {/* compass rose */}
        <g transform="translate(312,60)" opacity="0.55">
          <circle r="20" fill="none" stroke={WK.brown} strokeWidth="1" />

      </svg>

      <div style={{ position: 'absolute', left: `${here.x / 360 * 100}%`, top: `${here.y / 520 * 100}%`, transform: 'translate(-50%,-50%)' }}>
        <div style={{ position: 'absolute', left: '50%', top: '50%', transform: 'translate(-50%,-50%)', width: 46, height: 46, borderRadius: '50%', background: WK.terra, animation: 'wkPulse 2.6s ease-in-out infinite' }} />

      {/* host pins */}
      {pins.map(pn => {

        return (
          <button key={pn.id} className="wk-pressable" onClick={() => onPin(pn.id)} style={{

          </button>

<script type="text/babel">
/* ===== src/screens-onboarding.jsx ===== */
// screens-onboarding.jsx — the why / first run

function WKOnboarding({ onEnter, onVerify }) {
  const [step, setStep] = React.useState(0);
  const manifesto = [
    {
      tag: 'I · Why', big: 'Walk\nforever\nfree.',
      body: 'No price on a roof. No stranger at the door — only a wanderkind you have not met yet. The road belongs to those who keep it open.',
      stamp: { kind: 'star', label: 'Walk Free', sub: 'Est. on foot', ink: WK.terra, rot: -8 },
    },
    {
      tag: 'II · How', big: 'Every\nwanderkind\nis a host.',
      body: 'You take a bed tonight; you give one tomorrow. Hospitality that travels in both directions, carried on foot from door to open door.',
      stamp: { kind: 'door', label: 'Open Door', sub: 'Both ways', ink: WK.gold, rot: 6 },
    },
    {
      tag: 'III · What', big: 'A web of\nopen doors.',
      body: 'A network of verified wanderkinder who trust one another with open hearts and open doors — proven not by papers, but by faces, vouches, and the stamps of the road.',
      stamp: { kind: 'seal', label: 'Verified', sub: 'By trust', ink: WK.terra, rot: -5 },

  // cover

    return (

        <div style={{ height: '100%', display: 'flex', flexDirection: 'column', padding: '0 26px' }}>
          <div style={{ paddingTop: 64, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <span className="wk-meta">№ 001 / Wanderkind</span>
            <span className="wk-meta">Est. on foot</span>
          </div>

          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center' }} className="wk-fade-up">
            <div className="wk-eyebrow" style={{ marginBottom: 18 }}>The network of open doors</div>
            <div className="wk-display" style={{ fontSize: 62, letterSpacing: '-0.03em' }}>
              WANDER<br/>KIND
            </div>
            <div style={{ marginTop: 26, maxWidth: 280 }}>
              <WKRule style={{ marginBottom: 16 }} />
              <p className="wk-mono" style={{ fontSize: 13, lineHeight: 1.7, color: WK.ink70, margin: 0 }}>
                Wanderers and hosts, one and the same. Walk into a town a stranger; sleep there as kin.
              </p>
            </div>
          </div>

          <div style={{ position: 'absolute', right: -10, top: 150 }}>
            <WKStamp kind="boot" label="On Foot" sub="Always" ink={WK.terra} rot={9} size={104} />
          </div>

          <div style={{ paddingBottom: 40, display: 'flex', flexDirection: 'column', gap: 12 }}>

              I already wander here →
            </button>
          </div>
        </div>
      </WKPaper>
    );
  }

  const m = manifesto[step - 1];
  const last = step === manifesto.length;
  return (
    <WKPaper tone={step === 2 ? 'paper2' : 'paper'} style={{ height: '100%' }}>
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column', padding: '0 26px' }}>

        </div>

        <div key={step} style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center' }} className="wk-fade-up">

          <h1 className="wk-display" style={{ fontSize: 50, margin: 0, whiteSpace: 'pre-line' }}>{m.big}</h1>
          <div style={{ margin: '30px 0 6px' }}>
            <WKStamp {...m.stamp} animate size={90} />
          </div>
          <p style={{ fontSize: 16, lineHeight: 1.62, color: WK.ink70, maxWidth: 320, marginTop: 18, textWrap: 'pretty' }}>{m.body}</p>

        <div style={{ paddingBottom: 40, display: 'flex', gap: 12, alignItems: 'center' }}>
          {last ? (
            <WKButton variant="terra" full onClick={onVerify} icon={<WKIcon name="scan" s={18} c="#FBF3E4" />}>

            <>

            </>
          )}
        </div>
      </div>
    </WKPaper>
  );
}

window.WKOnboarding = WKOnboarding;

</script>

/* ===== src/screens-verify.jsx ===== */
// screens-verify.jsx — biometric verification (image → live image, no documents)

function WKVerify({ onDone, back, setDark }) {
  const [stage, setStage] = React.useState('intro'); // intro | scan | live | done
  React.useEffect(() => {
    if (setDark) setDark(stage === 'scan' || stage === 'live');
    return () => { if (setDark) setDark(false); };
  }, [stage]);
  const [prog, setProg] = React.useState(0);
  const [liveStep, setLiveStep] = React.useState(0);
  const liveCues = ['Look straight ahead', 'Turn gently left', 'Now turn right', 'Smile — you’re kin'];

  React.useEffect(() => {
    if (stage === 'scan') {
      setProg(0);
      const t = setInterval(() => setProg(p => {
        if (p >= 100) { clearInterval(t); setTimeout(() => setStage('live'), 350); return 100; }
        return p + 2.5;
      }), 45);
      return () => clearInterval(t);
    }
    if (stage === 'live') {
      setLiveStep(0);
      const t = setInterval(() => setLiveStep(s => {
        if (s >= liveCues.length - 1) { clearInterval(t); setTimeout(() => setStage('done'), 800); return s; }
        return s + 1;
      }), 950);
      return () => clearInterval(t);
    }
  }, [stage]);

  // ── intro ──
  if (stage === 'intro') {
    return (
      <WKPaper tone="paper" style={{ height: '100%' }}>
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column', padding: '0 26px' }}>
          <div style={{ paddingTop: 52 }}>
            {back && <button className="wk-pressable" onClick={back} style={{ width: 40, height: 40, borderRadius: '50%', border: `1px solid ${WK.ink14}`, background: WK.paper0, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}><WKIcon name="chevL" s={20} c={WK.ink} /></button>}
          </div>
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center' }} className="wk-fade-up">
            <WKEyebrow>The only key to the network</WKEyebrow>
            <h1 className="wk-display" style={{ fontSize: 44, margin: '16px 0 0' }}>A face,<br/>not papers.</h1>
            <p style={{ fontSize: 16, lineHeight: 1.6, color: WK.ink70, marginTop: 20, maxWidth: 320, textWrap: 'pretty' }}>
              No passport scan. No documents. We match a single photo to a living face — proof you are real, and the same wanderkind, every time you knock.
            </p>
            <div style={{ marginTop: 28, display: 'flex', flexDirection: 'column', gap: 14 }}>
              {[['eye', 'A quick liveness check', 'Look, turn, smile — ten seconds.'], ['seal', 'One identity, kept private', 'Your face never leaves your phone.'], ['heart', 'Trust the network can feel', 'Real people behind every open door.']].map(([ic, t, s]) => (
                <div key={t} style={{ display: 'flex', gap: 13, alignItems: 'flex-start' }}>
                  <div style={{ width: 38, height: 38, borderRadius: 10, background: WK.paper2, border: `1px solid ${WK.ink14}`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}><WKIcon name={ic} s={19} c={WK.terra} /></div>
                  <div><div style={{ fontWeight: 600, fontSize: 14.5 }}>{t}</div><div className="wk-mono" style={{ fontSize: 11, color: WK.ink55, marginTop: 3, letterSpacing: '0.02em' }}>{s}</div></div>
                </div>
              ))}
            </div>
          </div>
          <div style={{ paddingBottom: 40 }}>
            <WKButton variant="gold" full onClick={() => setStage('scan')} icon={<WKIcon name="scan" s={18} c="#FBF3E4" />}>Begin verification</WKButton>
            {back && <button onClick={onDone} className="wk-pressable wk-meta" style={{ background: 'none', border: 'none', cursor: 'pointer', width: '100%', padding: 14, marginTop: 4 }}>Maybe later →</button>}
          </div>
        </div>
      </WKPaper>
    );
  }

  // ── done ──
  if (stage === 'done') {
    return (
      <WKPaper tone="paper" style={{ height: '100%' }}>
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '0 30px', textAlign: 'center' }}>
          <WKStamp kind="seal" label="Verified Wanderkind" sub={WK_USER.home} ink={WK.gold} size={168} rot={-6} animate />
          <h1 className="wk-display wk-fade-up" style={{ fontSize: 36, margin: '34px 0 0' }}>You are<br/>verified.</h1>
          <p style={{ fontSize: 15.5, lineHeight: 1.6, color: WK.ink70, marginTop: 16, maxWidth: 300, textWrap: 'pretty' }} className="wk-fade-up">
            Welcome to the network of open doors. Your face is your key — now go find the people waiting to meet you.
          </p>
          <div style={{ marginTop: 30, width: '100%', maxWidth: 320 }} className="wk-fade-up">
            <WKButton variant="terra" full onClick={onDone} icon={<WKIcon name="arrow" s={18} c="#FBF3E4" />}>Enter the network</WKButton>
          </div>
        </div>
      </WKPaper>
    );
  }

  // ── scan / live (camera) ──
  const scanning = stage === 'scan';
  return (
    <div style={{ height: '100%', background: WK.ink, position: 'relative', overflow: 'hidden' }}>
      {/* camera placeholder */}
      <WKImg label="live camera · your face" tone="#241B14" ink="rgba(246,239,224,0.4)" style={{ position: 'absolute', inset: 0 }} />
      <div style={{ position: 'absolute', inset: 0, background: 'radial-gradient(60% 50% at 50% 42%, transparent 40%, rgba(20,15,11,0.86) 78%)' }} />

      {/* top */}
      <div style={{ position: 'absolute', top: 50, left: 0, right: 0, padding: '0 22px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', zIndex: 5 }}>
        <button className="wk-pressable" onClick={() => setStage('intro')} style={{ width: 40, height: 40, borderRadius: '50%', background: 'rgba(246,239,224,0.12)', border: 'none', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}><WKIcon name="close" s={18} c="#FBF3E4" /></button>
        <span className="wk-mono" style={{ fontSize: 10.5, letterSpacing: '0.16em', color: 'rgba(246,239,224,0.7)', textTransform: 'uppercase' }}>Liveness check</span>
        <div style={{ width: 40 }} />
      </div>

      {/* face oval + scan ring */}
      <div style={{ position: 'absolute', top: '40%', left: '50%', transform: 'translate(-50%,-50%)', width: 230, height: 290 }}>
        <svg width="230" height="290" viewBox="0 0 230 290" style={{ position: 'absolute', inset: 0 }}>
          <ellipse cx="115" cy="145" rx="104" ry="134" fill="none" stroke="rgba(246,239,224,0.25)" strokeWidth="2" strokeDasharray="3 8" />
          <ellipse cx="115" cy="145" rx="104" ry="134" fill="none" stroke={WK.gold} strokeWidth="3"
            strokeDasharray={2 * Math.PI * 119} strokeDashoffset={2 * Math.PI * 119 * (1 - (scanning ? prog / 100 : 1))}
            transform="rotate(-90 115 145)" style={{ transition: 'stroke-dashoffset .1s linear' }} strokeLinecap="round" />
          {/* corner brackets */}
          {[[20, 30], [210, 30], [20, 260], [210, 260]].map(([x, y], i) => (
            <path key={i} d={`M${x} ${y}`} />
          ))}
        </svg>
        {/* sweeping scan line */}
        {scanning && <div style={{ position: 'absolute', left: 14, right: 14, top: 0, bottom: 0, overflow: 'hidden', borderRadius: '50%' }}>
          <div style={{ position: 'absolute', left: 0, right: 0, height: 60, background: 'linear-gradient(to bottom, transparent, rgba(176,133,58,0.45), transparent)', animation: 'wkSweep 1.8s linear infinite' }} />
        </div>}
      </div>

      {/* cue + progress */}
      <div style={{ position: 'absolute', bottom: 56, left: 0, right: 0, padding: '0 32px', textAlign: 'center', zIndex: 5 }}>
        <div key={scanning ? 'scan' : liveStep} className="wk-fade-up" style={{ marginBottom: 20 }}>
          <div style={{ fontFamily: WK_FONT_SANS, fontWeight: 700, fontSize: 24, color: '#FBF3E4', letterSpacing: '-0.01em' }}>
            {scanning ? 'Reading your face…' : liveCues[liveStep]}
          </div>
          <div className="wk-mono" style={{ fontSize: 11, color: 'rgba(246,239,224,0.6)', letterSpacing: '0.06em', marginTop: 8 }}>
            {scanning ? 'Hold steady — matching one photo to life' : `Step ${liveStep + 1} of ${liveCues.length}`}
          </div>
        </div>
        {/* dots */}
        <div style={{ display: 'flex', gap: 8, justifyContent: 'center' }}>
          {(scanning ? [0] : liveCues).map((_, i) => (
            <div key={i} style={{ width: scanning ? 120 : 30, height: 4, borderRadius: 2, background: 'rgba(246,239,224,0.2)', overflow: 'hidden' }}>
              <div style={{ height: '100%', borderRadius: 2, background: WK.gold, width: scanning ? prog + '%' : (i <= liveStep ? '100%' : '0%'), transition: 'width .4s ease' }} />
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

window.WKVerify = WKVerify;

</script>

<script type="text/babel">
/* ===== src/screens-give.jsx ===== */
// screens-give.jsx — donations: a host, a wanderer, the network

function WKGive({ focus, go, back }) {
  const [sel, setSel] = React.useState(focus || 'wanderer');
  const [amt, setAmt] = React.useState(null);
  const [custom, setCustom] = React.useState('');
  const [monthly, setMonthly] = React.useState(false);
  const [done, setDone] = React.useState(false);
  const cause = WK_CAUSES.find(c => c.id === sel);
  const value = custom || amt;

  const framing = { 4: 'a night’s bread', 9: 'a warm bed', 18: 'three days on the trail', 5: 'a pair of dry socks', 12: 'a week of coffee', 25: 'a mountain pass', 3: 'keeps one walker free', 8: 'a verified door', 20: 'a town stays open' };

  if (done) {
    return (
      <WKPaper tone="paper" style={{ height: '100%' }}>
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '0 32px', textAlign: 'center' }}>
          <WKStamp kind="heart" label="Gift Given" sub={'€' + value} ink={WK.gold} size={160} rot={-7} animate />
          <h1 className="wk-display wk-fade-up" style={{ fontSize: 34, margin: '32px 0 0' }}>Thank you<br/>for walking<br/>with them.</h1>
          <p className="wk-fade-up" style={{ fontSize: 15, lineHeight: 1.6, color: WK.ink70, marginTop: 16, maxWidth: 290, textWrap: 'pretty' }}>
            €{value} {monthly ? 'every month ' : ''}to {cause.name}. {framing[value] ? 'That’s ' + framing[value] + '.' : ''} A stamp has been added to your ledger of kindness.
          </p>
          <div style={{ marginTop: 28, width: '100%', maxWidth: 320 }} className="wk-fade-up">
            <WKButton variant="terra" full onClick={() => { setDone(false); setAmt(null); setCustom(''); go('discover'); }} icon={<WKIcon name="arrow" s={18} c="#FBF3E4" />}>Keep walking</WKButton>
          </div>
        </div>
      </WKPaper>
    );
  }

  return (
    <WKPaper tone="paper" style={{ height: '100%' }}>
      <div className="wk-scroll" style={{ height: '100%' }}>
        <div style={{ padding: '52px 22px 0' }}>
          {back && <button className="wk-pressable" onClick={back} style={{ width: 40, height: 40, borderRadius: '50%', border: `1px solid ${WK.ink14}`, background: WK.paper0, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', marginBottom: 18 }}><WKIcon name="chevL" s={20} c={WK.ink} /></button>}
          <WKEyebrow>Give as you’ve been given</WKEyebrow>
          <h1 className="wk-display" style={{ fontSize: 34, margin: '8px 0 0' }}>Carry someone<br/>a little further</h1>
          <p style={{ fontSize: 14.5, lineHeight: 1.6, color: WK.ink70, marginTop: 14, textWrap: 'pretty' }}>Walk forever free — for everyone. No fees on a gift; every cent reaches the feet that need it.</p>
        </div>

        {/* cause selector */}
        <div className="wk-scroll" style={{ display: 'flex', gap: 10, overflowX: 'auto', padding: '20px 22px 6px' }}>
          {WK_CAUSES.map(c => {
            const on = sel === c.id;
            return (
              <button key={c.id} className="wk-pressable" onClick={() => { setSel(c.id); setAmt(null); setCustom(''); }} style={{
                flexShrink: 0, width: 150, textAlign: 'left', padding: '14px', borderRadius: 16, cursor: 'pointer',
                background: on ? WK.ink : WK.paper0, border: `1px solid ${on ? WK.ink : WK.ink14}`, color: on ? WK.paper0 : WK.ink,
              }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <WKAvatar name={c.name} size={36} />
                  {on && <WKIcon name="check" s={18} c={WK.gold} sw={2.4} />}
                </div>
                <div className="wk-mono" style={{ fontSize: 9.5, letterSpacing: '0.1em', textTransform: 'uppercase', marginTop: 11, color: on ? WK.gold : WK.terra }}>{c.kind}</div>
                <div style={{ fontWeight: 700, fontSize: 15, marginTop: 4 }}>{c.name}</div>
                <div className="wk-mono" style={{ fontSize: 10, marginTop: 3, color: on ? 'rgba(246,239,224,0.6)' : WK.ink55 }}>{c.place}</div>
              </button>
            );
          })}
        </div>

        {/* selected cause card */}
        <div style={{ padding: '14px 22px 0' }}>
          <div key={sel} className="wk-fade-up" style={{ padding: '18px', borderRadius: 18, background: WK.paper2, border: `1px solid ${WK.ink14}` }}>
            <p style={{ fontSize: 14.5, lineHeight: 1.55, color: WK.ink, margin: 0, textWrap: 'pretty' }}>{cause.note}</p>
            {cause.progress != null && (
              <div style={{ marginTop: 14 }}>
                <div style={{ height: 7, borderRadius: 4, background: WK.ink14, overflow: 'hidden' }}>
                  <div style={{ height: '100%', width: `${cause.progress * 100}%`, background: WK.terra, borderRadius: 4 }} />
                </div>
                <div className="wk-meta" style={{ marginTop: 7, display: 'flex', justifyContent: 'space-between' }}><span>{Math.round(cause.progress * 100)}% to Santiago</span><span>1 100 km to go</span></div>
              </div>
            )}
          </div>
        </div>

        {/* amounts */}
        <div style={{ padding: '20px 22px 0' }}>
          <div className="wk-meta" style={{ marginBottom: 11 }}>Choose a gift</div>
          <div style={{ display: 'flex', gap: 10 }}>
            {cause.suggested.map(a => {
              const on = amt === a && !custom;
              return (
                <button key={a} className="wk-pressable" onClick={() => { setAmt(a); setCustom(''); }} style={{ flex: 1, padding: '16px 0 13px', borderRadius: 14, cursor: 'pointer', border: `1.5px solid ${on ? WK.terra : WK.ink14}`, background: on ? WK.terra : WK.paper0, color: on ? '#FBF3E4' : WK.ink, textAlign: 'center' }}>
                  <div style={{ fontFamily: WK_FONT_SANS, fontWeight: 700, fontSize: 22 }}>€{a}</div>
                  <div className="wk-mono" style={{ fontSize: 8.5, letterSpacing: '0.04em', marginTop: 5, opacity: 0.85, lineHeight: 1.3, padding: '0 4px' }}>{(framing[a] || '').toUpperCase()}</div>
                </button>
              );
            })}
          </div>
          {/* custom */}
          <div style={{ marginTop: 11, display: 'flex', alignItems: 'center', gap: 10, padding: '4px 16px', borderRadius: 14, background: WK.paper0, border: `1px solid ${custom ? WK.terra : WK.ink14}` }}>
            <span style={{ fontFamily: WK_FONT_SANS, fontWeight: 700, fontSize: 20, color: WK.ink55 }}>€</span>
            <input value={custom} onChange={e => { setCustom(e.target.value.replace(/[^0-9]/g, '')); setAmt(null); }} placeholder="another amount" inputMode="numeric" style={{ flex: 1, border: 'none', outline: 'none', background: 'transparent', fontFamily: WK_FONT_SANS, fontWeight: 700, fontSize: 18, color: WK.ink, padding: '14px 0' }} />
          </div>

          {/* monthly */}
          <button className="wk-pressable" onClick={() => setMonthly(m => !m)} style={{ marginTop: 12, width: '100%', display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '13px 16px', borderRadius: 14, border: `1px solid ${WK.ink14}`, background: WK.paper0, cursor: 'pointer' }}>
            <span style={{ display: 'flex', alignItems: 'center', gap: 10 }}><WKIcon name="boot" s={18} c={WK.terra} /><span style={{ fontSize: 13.5, fontWeight: 500 }}>Walk with them every month</span></span>
            <span style={{ width: 46, height: 27, borderRadius: 999, background: monthly ? WK.terra : WK.ink14, position: 'relative', flexShrink: 0 }}>
              <span style={{ position: 'absolute', top: 3, left: monthly ? 22 : 3, width: 21, height: 21, borderRadius: '50%', background: WK.paper0, transition: 'left .25s' }} />
            </span>
          </button>
        </div>

        {/* give CTA */}
        <div style={{ padding: '20px 22px 28px' }}>
          <WKButton variant={value ? 'gold' : 'ghost'} full onClick={() => value && setDone(true)} style={{ opacity: value ? 1 : 0.55 }} icon={<WKIcon name="heart" s={18} c={value ? '#FBF3E4' : WK.ink40} fill={value ? '#FBF3E4' : 'none'} />}>
            {value ? `Give €${value}${monthly ? ' / month' : ''}` : 'Choose a gift'}
          </WKButton>
          <div className="wk-mono" style={{ fontSize: 10, color: WK.ink40, textAlign: 'center', marginTop: 12, letterSpacing: '0.04em' }}>0% platform fee · secured · cancel anytime</div>
        </div>
      </div>
    </WKPaper>
  );
}

window.WKGive = WKGive;

</script>
<script type="text/babel">
/* ===== src/app.jsx ===== */
// app.jsx — WANDERKIND router + device shell

function WanderkindApp() {
  injectWKStyles();
  const [route, setRoute] = React.useState('onboarding');
  const [hist, setHist] = React.useState([]);
  const [dark, setDark] = React.useState(false);

  const go = (r) => { setHist(h => [...h, route]); setRoute(r); };
  const back = () => setHist(h => { if (!h.length) return h; setRoute(h[h.length - 1]); return h.slice(0, -1); });
  const reset = (r) => { setHist([]); setRoute(r); };

  const [base, arg] = route.split(':');
  const tabRoutes = ['discover', 'messages', 'door', 'passport', 'give'];
  const showTab = tabRoutes.includes(route); // exact (no colon)
  const activeTab = tabRoutes.includes(base) ? base : (base === 'host' ? 'discover' : base === 'chat' ? 'messages' : base === 'give' ? 'give' : base);

  let screen;
  switch (base) {
    case 'onboarding': screen = <WKOnboarding onEnter={() => reset('discover')} onVerify={() => reset('verify')} />; break;
    case 'verify':     screen = <WKVerify onDone={() => reset('discover')} back={hist.length ? back : null} setDark={setDark} />; break;
    case 'discover':   screen = <WKDiscover go={go} />; break;
    case 'messages':   screen = <WKMessages go={go} />; break;
    case 'door':       screen = <WKDoor go={go} />; break;
    case 'passport':   screen = <WKPassport go={go} />; break;
    case 'give':       screen = <WKGive focus={arg} go={reset} back={arg ? back : null} />; break;
    case 'host':       screen = <WKHostDetail id={arg} go={go} back={back} />; break;
    case 'chat':       screen = <WKChat id={arg} go={go} back={back} />; break;
    default:           screen = <WKDiscover go={go} />;
  }

  return (
    <IOSDevice dark={dark}>
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        <div key={route} className="wk-fade-in" style={{ flex: 1, minHeight: 0, position: 'relative' }}>
          {screen}
        </div>
        {showTab && <WKTabBar active={activeTab} go={reset} />}
      </div>
    </IOSDevice>
  );
}

window.WanderkindApp = WanderkindApp;

</script>

<script type="text/babel" data-presets="react">
  function ScaledApp() {
    const [scale, setScale] = React.useState(1);
    React.useEffect(() => {
      const fit = () => {
        const margin = 40;
        const s = Math.min(
          (window.innerWidth - margin) / 402,
          (window.innerHeight - margin) / 874,
          1.05
        );
        setScale(s);
      };
      fit();
      window.addEventListener('resize', fit);
      return () => window.removeEventListener('resize', fit);
    }, []);
    return (
      <div style={{ transform: `scale(${scale})`, transformOrigin: 'center center', filter: 'drop-shadow(0 50px 90px rgba(0,0,0,0.55))' }}>
        <WanderkindApp />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<ScaledApp />);
</script>
</body>
